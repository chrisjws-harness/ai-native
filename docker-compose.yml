version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: blackjack
      POSTGRES_USER: bjuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bjuser -d blackjack"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://bjuser:${DB_PASSWORD}@db:5432/blackjack
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FLASK_APP: wsgi.py
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "flask db upgrade && flask seed-db && gunicorn -b 0.0.0.0:5000 wsgi:app"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
